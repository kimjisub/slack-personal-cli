name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test (node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      # Zero runtime dependencies; devDependencies provide lint + typecheck.
      - name: Install dev tooling
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Run tests
        run: npm test
